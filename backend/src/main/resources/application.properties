spring.application.name=network-security-game

spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/network_security_game?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

server.port=${SERVER_PORT:8080}

# OWASP-aligned session cookie defaults.
# `secure` defaults to false for local HTTP development and is overridden to true in the
# `docker` profile (where TLS termination is expected at the edge).
server.servlet.session.cookie.name=NSG_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${APP_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${APP_COOKIE_SECURE:false}
server.servlet.session.timeout=${APP_SESSION_TIMEOUT:30m}

# Hide error attributes (no stack trace, no exception class) in API error bodies.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Bound request bodies and multipart payloads. Keeps DoS-via-huge-body cheap to refuse.
spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:1MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:2MB}
server.tomcat.max-http-form-post-size=${APP_MAX_FORM_POST_SIZE:2097152}
server.tomcat.max-swallow-size=${APP_MAX_SWALLOW_SIZE:2097152}

# OWASP-aligned external-threat hardening.
# - CSRF compensating control: every mutating API call must carry this header.
# - CSP / CORS: strict allow-list values. Override per environment.
app.security.csrf.required-header=${APP_CSRF_HEADER:X-Requested-With}
app.security.csrf.required-value=${APP_CSRF_HEADER_VALUE:XMLHttpRequest}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
app.security.csp=${APP_CSP:default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'}

# External Threat Protection summary: how far back the SOC card looks.
app.security.threat-summary-window-minutes=${APP_THREAT_SUMMARY_WINDOW_MINUTES:60}

# Replay / integrity (sensitive actions)
app.security.replay.ttl-seconds=${APP_REPLAY_TTL_SECONDS:120}

# Anomaly-driven throttling (sensitive actions)
app.security.throttle.min-gap-ms=${APP_THROTTLE_MIN_GAP_MS:180}
app.security.throttle.max-delay-ms=${APP_THROTTLE_MAX_DELAY_MS:900}

logging.level.root=INFO
logging.level.backend=INFO

# Cryptographic keys are intentionally NOT defaulted here.
# - `dev` profile supplies placeholder keys in `application-dev.properties`
# - `docker` profile requires `APP_CRYPTO_MASTER_KEY` and `APP_CRYPTO_SHCS_KEY` via environment
app.crypto.master-key=${APP_CRYPTO_MASTER_KEY:}
app.crypto.shcs-key=${APP_CRYPTO_SHCS_KEY:}
app.crypto.iv-length-bytes=${APP_CRYPTO_IV_LENGTH_BYTES:12}
app.crypto.aes-transformation=${APP_CRYPTO_AES_TRANSFORMATION:AES/GCM/NoPadding}
app.crypto.gcm-tag-length-bits=${APP_CRYPTO_GCM_TAG_BITS:128}

app.puzzle.max-iterations=${APP_PUZZLE_MAX_ITERATIONS:180000}
app.puzzle.challenge-bytes=${APP_PUZZLE_CHALLENGE_BYTES:12}
app.puzzle.simulated-delay-ms=${APP_PUZZLE_DELAY_MS:250}
app.puzzle.key-derivation-salt=${APP_PUZZLE_KEY_SALT:phase1-puzzle-salt}
app.puzzle.attempts-allowed=${APP_PUZZLE_ATTEMPTS_ALLOWED:3}
app.puzzle.time-limit-seconds=${APP_PUZZLE_TIME_LIMIT_SECONDS:300}
app.puzzle.min-adaptive-iterations=${APP_PUZZLE_MIN_ADAPTIVE_ITERATIONS:15000}

app.cphs.random-key-bytes=${APP_CPHS_RANDOM_KEY_BYTES:32}

app.attack.normal-confidence-min=${APP_ATTACK_NORMAL_CONFIDENCE_MIN:0.78}
app.attack.normal-confidence-max=${APP_ATTACK_NORMAL_CONFIDENCE_MAX:0.96}
app.attack.normal-classification-threshold=${APP_ATTACK_NORMAL_CLASSIFICATION_THRESHOLD:0.70}
app.attack.shcs-confidence-min=${APP_ATTACK_SHCS_CONFIDENCE_MIN:0.18}
app.attack.shcs-confidence-max=${APP_ATTACK_SHCS_CONFIDENCE_MAX:0.42}
app.attack.shcs-classification-threshold=${APP_ATTACK_SHCS_CLASSIFICATION_THRESHOLD:0.55}
app.attack.cphs-confidence-min=${APP_ATTACK_CPHS_CONFIDENCE_MIN:0.31}
app.attack.cphs-confidence-max=${APP_ATTACK_CPHS_CONFIDENCE_MAX:0.59}
app.attack.cphs-classification-threshold=${APP_ATTACK_CPHS_CLASSIFICATION_THRESHOLD:0.60}
app.attack.jamming-threshold=${APP_ATTACK_JAMMING_THRESHOLD:0.65}
app.attack.normal-base-time-ms=${APP_ATTACK_NORMAL_BASE_TIME_MS:30}
app.attack.shcs-base-time-ms=${APP_ATTACK_SHCS_BASE_TIME_MS:65}
app.attack.cphs-base-time-ms=${APP_ATTACK_CPHS_BASE_TIME_MS:95}

app.game.defense-node-cost=${APP_GAME_DEFENSE_NODE_COST:1.0}
app.game.defense-edge-cost=${APP_GAME_DEFENSE_EDGE_COST:1.0}
app.game.attack-node-cost=${APP_GAME_ATTACK_NODE_COST:1.0}
app.game.attack-edge-cost=${APP_GAME_ATTACK_EDGE_COST:1.0}
app.game.recovery-node-cost=${APP_GAME_RECOVERY_NODE_COST:1.0}
app.game.recovery-edge-cost=${APP_GAME_RECOVERY_EDGE_COST:1.0}
app.game.base-node-attack-success-probability=${APP_GAME_BASE_NODE_ATTACK_SUCCESS_PROB:0.72}
app.game.base-edge-attack-success-probability=${APP_GAME_BASE_EDGE_ATTACK_SUCCESS_PROB:0.68}
app.game.defended-target-success-penalty=${APP_GAME_DEFENDED_TARGET_SUCCESS_PENALTY:0.55}
app.game.normal-attack-multiplier=${APP_GAME_NORMAL_ATTACK_MULTIPLIER:1.0}
app.game.shcs-attack-multiplier=${APP_GAME_SHCS_ATTACK_MULTIPLIER:0.7}
app.game.cphs-attack-multiplier=${APP_GAME_CPHS_ATTACK_MULTIPLIER:0.55}
app.game.damage-connectivity-weight=${APP_GAME_DAMAGE_CONNECTIVITY_WEIGHT:1.0}
app.game.damage-node-weight=${APP_GAME_DAMAGE_NODE_WEIGHT:0.6}
app.game.damage-edge-weight=${APP_GAME_DAMAGE_EDGE_WEIGHT:0.4}

app.seed-demo-data.enabled=${APP_SEED_DEMO_DATA:false}
app.seed-demo-data.sender-username=${APP_DEMO_SENDER_USERNAME:demo_sender}
app.seed-demo-data.sender-password=${APP_DEMO_SENDER_PASSWORD:DemoSender#123}
app.seed-demo-data.receiver-username=${APP_DEMO_RECEIVER_USERNAME:demo_receiver}
app.seed-demo-data.receiver-password=${APP_DEMO_RECEIVER_PASSWORD:DemoReceiver#123}

# Adaptive security (risk scoring + escalation)
app.adaptive.elevated-threshold=${APP_ADAPTIVE_ELEVATED_THRESHOLD:0.45}
app.adaptive.high-threshold=${APP_ADAPTIVE_HIGH_THRESHOLD:0.70}
app.adaptive.critical-threshold=${APP_ADAPTIVE_CRITICAL_THRESHOLD:0.88}
app.adaptive.weight-failed-attempts=${APP_ADAPTIVE_W_FAILED:0.25}
app.adaptive.weight-unusual-login-time=${APP_ADAPTIVE_W_LOGIN_TIME:0.18}
app.adaptive.weight-new-device=${APP_ADAPTIVE_W_DEVICE:0.22}
app.adaptive.weight-attack-intensity=${APP_ADAPTIVE_W_ATTACK:0.20}
app.adaptive.weight-behavior-deviation=${APP_ADAPTIVE_W_BEHAVIOR:0.15}
app.adaptive.lock-minutes-on-critical=${APP_ADAPTIVE_LOCK_MINUTES:15}

app.advanced.base-compromise-floor=${APP_ADV_BASE_COMPROMISE_FLOOR:0.08}
app.advanced.vulnerability-weight=${APP_ADV_VULNERABILITY_WEIGHT:0.52}
app.advanced.exploit-weight=${APP_ADV_EXPLOIT_WEIGHT:0.38}
app.advanced.defense-mitigation-weight=${APP_ADV_DEFENSE_MITIGATION_WEIGHT:0.68}
app.advanced.pressure-weight=${APP_ADV_PRESSURE_WEIGHT:0.35}

app.advanced.normal-compromise-multiplier=${APP_ADV_NORMAL_COMPROMISE_MULTIPLIER:1.0}
app.advanced.shcs-compromise-multiplier=${APP_ADV_SHCS_COMPROMISE_MULTIPLIER:0.84}
app.advanced.cphs-compromise-multiplier=${APP_ADV_CPHS_COMPROMISE_MULTIPLIER:0.68}

app.advanced.base-detection-probability=${APP_ADV_BASE_DETECTION_PROBABILITY:0.12}
app.advanced.defended-detection-boost=${APP_ADV_DEFENDED_DETECTION_BOOST:0.28}
app.advanced.honeypot-detection-boost=${APP_ADV_HONEYPOT_DETECTION_BOOST:0.44}

app.advanced.hardening-node-cost=${APP_ADV_HARDENING_NODE_COST:1.0}
app.advanced.hardening-defense-boost=${APP_ADV_HARDENING_DEFENSE_BOOST:0.12}
app.advanced.recovery-node-cost=${APP_ADV_RECOVERY_NODE_COST:1.0}
app.advanced.recovery-probability-boost=${APP_ADV_RECOVERY_PROBABILITY_BOOST:0.34}

app.advanced.mtd-edge-shuffle-cost=${APP_ADV_MTD_EDGE_SHUFFLE_COST:1.0}
app.advanced.mtd-identity-rotation-cost=${APP_ADV_MTD_IDENTITY_ROTATION_COST:1.2}
app.advanced.mtd-encryption-rotation-cost=${APP_ADV_MTD_ENCRYPTION_ROTATION_COST:1.0}
app.advanced.mtd-disable-path-cost=${APP_ADV_MTD_DISABLE_PATH_COST:0.9}
app.advanced.mtd-max-edge-swaps=${APP_ADV_MTD_MAX_EDGE_SWAPS:4}
app.advanced.mtd-max-path-disables=${APP_ADV_MTD_MAX_PATH_DISABLES:4}

app.advanced.deception-honeypot-cost=${APP_ADV_DECEPTION_HONEYPOT_COST:1.0}
app.advanced.deception-max-honeypot-fraction=${APP_ADV_DECEPTION_MAX_HONEYPOT_FRACTION:0.3}
app.advanced.honeypot-link-probability=${APP_ADV_HONEYPOT_LINK_PROBABILITY:0.45}

app.advanced.persistence-defense-decay=${APP_ADV_PERSISTENCE_DEFENSE_DECAY:0.07}

app.advanced.impact-server-weight=${APP_ADV_IMPACT_SERVER_WEIGHT:1.0}
app.advanced.impact-iot-weight=${APP_ADV_IMPACT_IOT_WEIGHT:0.55}
app.advanced.impact-gateway-weight=${APP_ADV_IMPACT_GATEWAY_WEIGHT:0.85}
app.advanced.impact-database-weight=${APP_ADV_IMPACT_DATABASE_WEIGHT:1.25}
app.advanced.impact-honeypot-weight=${APP_ADV_IMPACT_HONEYPOT_WEIGHT:0.2}

app.advanced.attacker-path-depth-benefit-weight=${APP_ADV_ATTACKER_PATH_DEPTH_BENEFIT_WEIGHT:0.08}
app.advanced.attacker-deception-penalty-weight=${APP_ADV_ATTACKER_DECEPTION_PENALTY_WEIGHT:0.22}
