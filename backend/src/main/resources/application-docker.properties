# Docker Compose profile (`SPRING_PROFILES_ACTIVE=docker`)
#
# Secrets must be supplied via environment variables (see backend/.env.example).

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# In docker profile we assume TLS terminates at the edge proxy.
server.servlet.session.cookie.secure=${APP_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=${APP_COOKIE_SAME_SITE:lax}
